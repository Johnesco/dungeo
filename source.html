<html lang="en">
<head>
<meta charset="utf-8">
<title>Source &mdash; DUNGEON</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #0a0a0a;
  color: #d4c5a9;
  font-family: Georgia, "Times New Roman", serif;
  overflow: hidden;
}

/* --- Layout --- */
.container {
  display: flex;
  height: 100%;
}

/* --- Sidebar --- */
.sidebar {
  width: 280px;
  min-width: 280px;
  background: #0e0e0c;
  border-right: 1px solid #1e1a14;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid #1e1a14;
}

.sidebar-header h1 {
  font-size: 0.95em;
  color: #c4b48a;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.sidebar-header a {
  font-size: 0.8em;
  color: #887755;
  text-decoration: none;
  border-bottom: 1px solid transparent;
}

.sidebar-header a:hover {
  color: #aa9966;
  border-bottom-color: #aa9966;
}

.tree-controls {
  display: flex;
  gap: 8px;
  padding: 6px 16px;
  border-bottom: 1px solid #1e1a14;
}

.tree-controls button {
  background: none;
  border: 1px solid #2a2418;
  border-radius: 3px;
  color: #776644;
  font-family: "SF Mono", "Fira Code", Consolas, "Courier New", monospace;
  font-size: 0.7em;
  padding: 2px 8px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.tree-controls button:hover {
  color: #c4b48a;
  border-color: #5a4a30;
}

.nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.nav::-webkit-scrollbar { width: 6px; }
.nav::-webkit-scrollbar-track { background: #0e0e0c; }
.nav::-webkit-scrollbar-thumb { background: #2a2418; border-radius: 3px; }

.nav-item {
  display: block;
  padding: 4px 16px;
  font-family: "SF Mono", "Fira Code", Consolas, "Courier New", monospace;
  font-size: 0.75em;
  color: #998866;
  text-decoration: none;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.1s, color 0.1s;
}

.nav-item:hover {
  background: #151510;
  color: #c4b48a;
}

.nav-item.active {
  background: #18160f;
  color: #e8d090;
  border-left-color: #e8d090;
}

.nav-part {
  font-weight: bold;
  color: #c4b48a;
  padding-top: 10px;
  font-size: 0.85em;
}

.nav-chapter {
  padding-left: 24px;
}

.nav-section {
  padding-left: 36px;
  font-size: 0.78em;
  color: #776644;
}

/* --- File tree --- */
.file-tree { padding: 8px 0; }

.file-tree-dir {
  display: block;
  padding: 3px 16px;
  font-family: "SF Mono", "Fira Code", Consolas, "Courier New", monospace;
  font-size: 0.78em;
  color: #887755;
  cursor: pointer;
  user-select: none;
}

.file-tree-dir:hover { color: #c4b48a; }
.file-tree-dir::before { content: "\25BE "; color: #554433; font-size: 1.3em; vertical-align: -1px; }
.file-tree-dir.collapsed::before { content: "\25B8 "; }
.file-tree-dir.collapsed + .file-tree-children { display: none; }

.file-tree-file {
  display: block;
  padding: 3px 16px 3px 28px;
  font-family: "SF Mono", "Fira Code", Consolas, "Courier New", monospace;
  font-size: 0.75em;
  color: #998866;
  text-decoration: none;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.1s, color 0.1s;
}

.file-tree-file:hover { background: #151510; color: #c4b48a; }
.file-tree-file.active { background: #18160f; color: #e8d090; border-left-color: #e8d090; }

.file-tree-children { padding-left: 12px; }

.nav-separator {
  height: 1px;
  background: #1e1a14;
  margin: 8px 16px;
}

/* --- Main content --- */
.main {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.toolbar {
  padding: 8px 20px;
  background: #0e0e0c;
  border-bottom: 1px solid #1e1a14;
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 0.85em;
  color: #887755;
}

.toolbar .file-path {
  font-family: "SF Mono", "Fira Code", Consolas, "Courier New", monospace;
  font-size: 0.9em;
  color: #aa9966;
}

.toolbar .line-count {
  margin-left: auto;
}

.search-box {
  background: #111;
  border: 1px solid #2a2418;
  border-radius: 4px;
  color: #d4c5a9;
  font-family: "SF Mono", "Fira Code", Consolas, "Courier New", monospace;
  font-size: 0.9em;
  padding: 3px 8px;
  width: 200px;
  outline: none;
}

.search-box:focus {
  border-color: #4a3a20;
}

.search-box::placeholder {
  color: #554433;
}

.code-wrap {
  flex: 1;
  overflow: auto;
  padding: 16px 0;
}

.code-wrap::-webkit-scrollbar { width: 8px; }
.code-wrap::-webkit-scrollbar-track { background: #0a0a0a; }
.code-wrap::-webkit-scrollbar-thumb { background: #2a2418; border-radius: 4px; }
.code-wrap::-webkit-scrollbar-thumb:hover { background: #3a3020; }

/* --- Code display --- */
table.code {
  border-collapse: collapse;
  width: 100%;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, "Courier New", monospace;
  font-size: 14px;
  line-height: 1.55;
}

table.code td {
  vertical-align: top;
}

td.ln {
  min-width: 48px;
  padding: 0 16px 0 20px;
  text-align: right;
  color: #7a6a50;
  user-select: none;
  white-space: nowrap;
}

td.lc {
  white-space: pre-wrap;
  word-break: break-all;
  padding: 0 20px 0 0;
}

tr.heading-line td {
  padding-top: 8px;
}

tr.heading-line td.lc {
  font-weight: bold;
  color: #e8d8b0;
  font-size: 15px;
}

tr.heading-line td.ln {
  color: #5a4a30;
}

tr:target td,
tr.highlight td {
  background: #1a1810;
}

tr:target td.ln,
tr.highlight td.ln {
  color: #887755;
}

/* --- Syntax colors --- */
.syn-str   { color: #8bab6e; }  /* strings — muted green */
.syn-cmt   { color: #908070; font-style: italic; }  /* comments */
.syn-sub   { color: #7ea8b0; }  /* say substitutions — teal */
.syn-kw    { color: #c49060; }  /* keywords — warm orange */
.syn-head  { color: #e8d8b0; font-weight: bold; }  /* headings */
.syn-rule  { color: #b89860; }  /* rule names */
.syn-num   { color: #b08a70; }  /* numbers */
.syn-tbl   { color: #9090b0; }  /* table headers */

/* --- Loading / error --- */
.loading {
  text-align: center;
  padding: 80px 40px;
  color: #887755;
  font-size: 1.1em;
}

.loading em {
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

.error-msg {
  text-align: center;
  padding: 80px 40px;
  color: #aa6644;
}

/* --- Search highlights --- */
.search-hit {
  background: #5a4a10;
  color: #ffe8a0;
  border-radius: 2px;
}

.search-current {
  background: #7a6a20;
  outline: 1px solid #aa9930;
}

/* --- Sidebar toggle --- */
.sidebar-toggle {
  background: none;
  border: 1px solid #2a2418;
  border-radius: 4px;
  color: #887755;
  font-size: 1em;
  width: 26px;
  height: 26px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: color 0.15s, border-color 0.15s;
  padding: 0;
  line-height: 1;
  font-family: inherit;
}

.sidebar-toggle:hover {
  color: #c4b48a;
  border-color: #5a4a30;
}

.sidebar-toggle.visible { display: flex; }

.sidebar.collapsed {
  display: none;
}

    if (e.key === 'Enter') {
      e.preventDefault();
      if (e.shiftKey) prevHit(); else nextHit();
    }
    if (e.key === 'Escape') {
      clearSearch();
      this.value = '';
      this.blur();
    }
  });

  // Ctrl+F intercept
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
  });
}

init();
</script>

</body>
</html>
